<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wekitsu Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar {
            width: 8px;
        }

        .container::-webkit-scrollbar-track {
            background: #2d2d2d;
            border-radius: 8px;
        }

        .container::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .container::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cccccc;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #1e1e1e;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #007acc;
        }

        .browse-btn {
            padding: 0 15px;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .browse-btn:hover {
            background-color: #555;
        }

        .error {
            color: #ff5f5f;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .primary-btn {
            width: 100%;
            padding: 12px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.2s;
        }

        .primary-btn:hover {
            background-color: #0098ff;
        }

        .primary-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Settings</h2>
        <div class="form-group">
            <label for="wekitsuUrl">Wekitsu URL</label>
            <div class="input-group">
                <input type="text" id="wekitsuUrl" placeholder="e.g. http://localhost:8080">
            </div>
            <div class="error" id="urlError">Wekitsu URL is required</div>
        </div>
        <div class="form-group">
            <label for="workspacePath">Workspace Path</label>
            <div class="input-group">
                <input type="text" id="workspacePath" placeholder="e.g. C:\Workspace">
                <button type="button" class="browse-btn" id="browseWorkspaceBtn">Browse</button>
            </div>
            <div class="error" id="workspaceError">Workspace path is required</div>
        </div>
        <div class="form-group">
            <label for="mayaPath">Maya Path</label>
            <div class="input-group">
                <input type="text" id="mayaPath" placeholder="e.g. C:\Program Files\Autodesk\Maya\bin\maya.exe">
                <button type="button" class="browse-btn" id="browseMayaBtn">Browse</button>
            </div>
        </div>
        <div class="form-group">
            <label for="blenderPath">Blender Path</label>
            <div class="input-group">
                <input type="text" id="blenderPath"
                    placeholder="e.g. C:\Program Files\Blender Foundation\Blender\blender.exe">
                <button type="button" class="browse-btn" id="browseBlenderBtn">Browse</button>
            </div>
        </div>
        <div class="form-group">
            <label for="photoshopPath">Photoshop Path</label>
            <div class="input-group">
                <input type="text" id="photoshopPath"
                    placeholder="e.g. C:\Program Files\Adobe\Adobe Photoshop\Photoshop.exe">
                <button type="button" class="browse-btn" id="browsePhotoshopBtn">Browse</button>
            </div>
        </div>
        <div class="form-group">
            <label for="substancePainterPath">Substance Painter Path</label>
            <div class="input-group">
                <input type="text" id="substancePainterPath"
                    placeholder="e.g. C:\Program Files\Adobe\Adobe Substance 3D Painter\Adobe Substance 3D Painter.exe">
                <button type="button" class="browse-btn" id="browseSubstancePainterBtn">Browse</button>
            </div>
        </div>
        <div class="form-group">
            <label for="pureRefPath">Pure Ref Path</label>
            <div class="input-group">
                <input type="text" id="pureRefPath"
                    placeholder="e.g. C:\Program Files\PureRef\PureRef.exe">
                <button type="button" class="browse-btn" id="browsePureRefBtn">Browse</button>
            </div>
        </div>
        <div class="form-group">
            <label for="substanceDesignerPath">Substance Designer Path</label>
            <div class="input-group">
                <input type="text" id="substanceDesignerPath"
                    placeholder="e.g. C:\Program Files\Adobe\Adobe Substance 3D Designer\Adobe Substance 3D Designer.exe">
                <button type="button" class="browse-btn" id="browseSubstanceDesignerBtn">Browse</button>
            </div>
        </div>
        <div class="form-group">
            <label for="zbrushPath">Zbrush Path</label>
            <div class="input-group">
                <input type="text" id="zbrushPath"
                    placeholder="e.g. C:\Program Files\Maxon ZBrush\ZBrush.exe">
                <button type="button" class="browse-btn" id="browseZbrushBtn">Browse</button>
            </div>
        </div>
        <button class="primary-btn" id="saveBtn">Save & Continue</button>
    </div>

    <script>
        const wekitsuInput = document.getElementById('wekitsuUrl');
        const urlError = document.getElementById('urlError');

        const workspaceInput = document.getElementById('workspacePath');
        const browseWorkspaceBtn = document.getElementById('browseWorkspaceBtn');
        const saveBtn = document.getElementById('saveBtn');
        const workspaceError = document.getElementById('workspaceError');

        const mayaInput = document.getElementById('mayaPath');
        const browseMayaBtn = document.getElementById('browseMayaBtn');

        const blenderInput = document.getElementById('blenderPath');
        const browseBlenderBtn = document.getElementById('browseBlenderBtn');

        const photoshopInput = document.getElementById('photoshopPath');
        const browsePhotoshopBtn = document.getElementById('browsePhotoshopBtn');

        const substancePainterInput = document.getElementById('substancePainterPath');
        const browseSubstancePainterBtn = document.getElementById('browseSubstancePainterBtn');

        const pureRefInput = document.getElementById('pureRefPath');
        const browsePureRefBtn = document.getElementById('browsePureRefBtn');

        const substanceDesignerInput = document.getElementById('substanceDesignerPath');
        const browseSubstanceDesignerBtn = document.getElementById('browseSubstanceDesignerBtn');

        const zbrushInput = document.getElementById('zbrushPath');
        const browseZbrushBtn = document.getElementById('browseZbrushBtn');

        // Browse for directory
        async function handleBrowse(inputElement) {
            try {
                const path = await window.electronAPI.selectDirectory();
                if (path) {
                    inputElement.value = path;
                }
            } catch (err) {
                console.error("Failed to open directory dialog", err);
            }
        }

        async function handleBrowseFile(inputElement) {
            try {
                const path = await window.electronAPI.selectFile();
                if (path) {
                    inputElement.value = path;
                }
            } catch (err) {
                console.error("Failed to open file dialog", err);
            }
        }

        browseWorkspaceBtn.addEventListener('click', () => handleBrowse(workspaceInput));
        browseMayaBtn.addEventListener('click', () => handleBrowseFile(mayaInput));
        browseBlenderBtn.addEventListener('click', () => handleBrowseFile(blenderInput));
        browsePhotoshopBtn.addEventListener('click', () => handleBrowseFile(photoshopInput));
        browseSubstancePainterBtn.addEventListener('click', () => handleBrowseFile(substancePainterInput));
        browsePureRefBtn.addEventListener('click', () => handleBrowseFile(pureRefInput));
        browseSubstanceDesignerBtn.addEventListener('click', () => handleBrowseFile(substanceDesignerInput));
        browseZbrushBtn.addEventListener('click', () => handleBrowseFile(zbrushInput));

        // Load existing settings
        async function loadSettings() {
            try {
                const settings = await window.electronAPI.getSettings();
                if (settings.wekitsuUrl) wekitsuInput.value = settings.wekitsuUrl;
                if (settings.workspacePath) workspaceInput.value = settings.workspacePath;
                if (settings.mayaPath) mayaInput.value = settings.mayaPath;
                if (settings.blenderPath) blenderInput.value = settings.blenderPath;
                if (settings.photoshopPath) photoshopInput.value = settings.photoshopPath;
                if (settings.substancePainterPath) substancePainterInput.value = settings.substancePainterPath;
                if (settings.pureRefPath) pureRefInput.value = settings.pureRefPath;
                if (settings.substanceDesignerPath) substanceDesignerInput.value = settings.substanceDesignerPath;
                if (settings.zbrushPath) zbrushInput.value = settings.zbrushPath;
            } catch (err) {
                console.error("Failed to load settings:", err);
            }
        }

        saveBtn.addEventListener('click', async () => {
            const wekitsuUrl = wekitsuInput.value.trim();
            const workspacePath = workspaceInput.value.trim();
            const mayaPath = mayaInput.value.trim();
            const blenderPath = blenderInput.value.trim();
            const photoshopPath = photoshopInput.value.trim();
            const substancePainterPath = substancePainterInput.value.trim();
            const pureRefPath = pureRefInput.value.trim();
            const substanceDesignerPath = substanceDesignerInput.value.trim();
            const zbrushPath = zbrushInput.value.trim();

            let hasError = false;

            if (!wekitsuUrl) {
                urlError.style.display = 'block';
                hasError = true;
            } else {
                urlError.style.display = 'none';
            }

            if (!workspacePath) {
                workspaceError.style.display = 'block';
                hasError = true;
            } else {
                workspaceError.style.display = 'none';
            }

            if (hasError) return;

            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            try {
                await window.electronAPI.saveSettings({
                    wekitsuUrl,
                    workspacePath,
                    mayaPath,
                    blenderPath,
                    photoshopPath,
                    substancePainterPath,
                    pureRefPath,
                    substanceDesignerPath,
                    zbrushPath
                });
            } catch (err) {
                console.error("Failed to save settings:", err);
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save & Continue';
            }
        });

        loadSettings();
    </script>
</body>

</html>
